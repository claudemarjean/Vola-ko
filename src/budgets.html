<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/icones/vola-ko/vola-ko-favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icones/vola-ko/icon-vola-ko-color.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="192x192" href="/icones/vola-ko/icon-vola-ko-white.png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="/icones/vola-ko/icon-vola-ko-color.png">
  <title>Budgets - Vola-ko</title>
  
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/dark.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/notifications.css">
  <link rel="stylesheet" href="/css/app-layout.css">
  <link rel="stylesheet" href="/css/bottom-nav.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar" id="sidebar-container"></aside>

    <main class="main-content">
      <div class="app-header">
        <div class="header-title">
          <h1 data-i18n="budgets.title">Mes Budgets</h1>
          <p data-i18n="budgets.subtitle">Définissez et suivez vos budgets par catégorie</p>
        </div>
        <button class="btn btn-primary" id="add-budget-btn">
          <span>➕</span>
          <span data-i18n="budgets.add">Créer un budget</span>
        </button>
      </div>

      <div class="filters-card card">
        <div class="filters-row">
          <select id="budget-category-filter" class="form-select">
            <option value="">Toutes les catégories</option>
          </select>

          <select id="budget-period-filter" class="form-select">
            <option value="current_month">Période: mois courant</option>
            <option value="last_month">Période: mois dernier</option>
            <option value="since_last_month">Période: depuis mois dernier</option>
            <option value="current_year">Période: année courante</option>
            <option value="custom">Période: personnalisée</option>
            <option value="all">Toutes les périodes</option>
          </select>

          <input type="date" id="budget-filter-start" class="form-input" aria-label="Date de début du filtre budget">
          <input type="date" id="budget-filter-end" class="form-input" aria-label="Date de fin du filtre budget">
        </div>
      </div>

      <!-- Budgets Grid -->
      <div class="budgets-grid" id="budgets-grid">
        <!-- Budget cards will be loaded dynamically -->
        <div class="budget-card card">
          <div class="budget-header">
            <div class="budget-content">
              <h3>🛒 Alimentation</h3>
              <p>Budget mensuel</p>
            </div>
            <button class="btn-icon">⋯</button>
          </div>
          
          <div class="budget-progress">
            <div class="progress-bar">
              <div class="progress-fill" style="width: 65%; background-color: var(--color-warning);"></div>
            </div>
            <div class="progress-info">
              <span>325,000 MGA / 500,000 MGA</span>
              <span class="progress-percent">65%</span>
            </div>
          </div>

          <div class="budget-stats">
            <div>
              <span class="stat-label">Restant</span>
              <span class="stat-value">175,000 MGA</span>
            </div>
            <div>
              <span class="stat-label">Dépensé</span>
              <span class="stat-value">325,000 MGA</span>
            </div>
          </div>
        </div>
      </div>
    </main>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>

  <!-- Modal -->
  <div id="budget-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2 id="budget-modal-title" data-i18n="budgets.modal_title">Créer un budget</h2>
        <button class="modal-close">&times;</button>
      </div>
      <form id="budget-form">
        <div class="form-group">
          <label for="budget-category" data-i18n="budgets.category">Catégorie</label>
          <select id="budget-category" class="form-select" required>
            <option value="">Sélectionner...</option>
          </select>
        </div>

        <div class="form-group" id="budget-other-reference-group" style="display: none;">
          <label for="budget-other-reference">Référence complémentaire (facultatif)</label>
          <input type="text" id="budget-other-reference" class="form-input" placeholder="Ex: Dépenses diverses, etc.">
          <small style="color: var(--text-secondary); font-size: 0.875rem;">Cette information est facultative et reste dans la catégorie "Autre"</small>
        </div>

        <div class="form-group">
          <label for="budget-amount" data-i18n="budgets.amount">Montant mensuel (MGA)</label>
          <input type="number" id="budget-amount" class="form-input" required min="0">
        </div>

        <div class="form-group">
          <label for="budget-start-date">Date de début du budget</label>
          <input type="date" id="budget-start-date" class="form-input">
        </div>

        <div class="form-group">
          <label for="budget-end-date">Date de fin du budget</label>
          <input type="date" id="budget-end-date" class="form-input">
        </div>

        <div class="form-group">
          <label for="budget-notes">Détails / notes (facultatif)</label>
          <textarea id="budget-notes" class="form-input" rows="3" placeholder="Ex: Abonnements, sorties, achats uniques..." style="resize: vertical;"></textarea>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary modal-close" data-i18n="common.cancel">Annuler</button>
          <button type="submit" id="budget-submit" class="btn btn-primary" data-i18n="common.save">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <div id="budget-expense-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Ajouter une depense</h2>
        <button class="modal-close">&times;</button>
      </div>
      <form id="budget-expense-form">
        <div class="form-group">
          <label>Categorie budget</label>
          <div id="budget-expense-category-label" class="form-input" style="display:flex; align-items:center; background:var(--bg-secondary);"></div>
        </div>

        <div class="form-group">
          <label for="budget-expense-description">Description</label>
          <input type="text" id="budget-expense-description" class="form-input" required>
        </div>

        <div class="form-group">
          <label for="budget-expense-amount">Montant (MGA)</label>
          <input type="number" id="budget-expense-amount" class="form-input" required min="0.01" step="0.01">
        </div>

        <div class="form-group">
          <label for="budget-expense-date">Date</label>
          <input type="date" id="budget-expense-date" class="form-input" required>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-secondary modal-close">Annuler</button>
          <button type="submit" class="btn btn-primary" style="display:inline-flex; align-items:center; justify-content:center; gap:0.35rem;">
            <span style="font-weight:700;">+</span><span>💸</span><span>Enregistrer la depense</span>
          </button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/js/mobile-menu.js"></script>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/budgets.js"></script>
</body>
</html>
