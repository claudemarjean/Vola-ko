<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="/icones/vola-ko/vola-ko-favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/icones/vola-ko/icon-vola-ko-color.png" media="(prefers-color-scheme: light)">
  <link rel="icon" type="image/png" sizes="192x192" href="/icones/vola-ko/icon-vola-ko-white.png" media="(prefers-color-scheme: dark)">
  <link rel="apple-touch-icon" href="/icones/vola-ko/icon-vola-ko-color.png">
  <title>Transactions - Vola-ko</title>

  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/dark.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="/css/notifications.css">
  <link rel="stylesheet" href="/css/app-layout.css">
  <link rel="stylesheet" href="/css/bottom-nav.css">
  <link rel="stylesheet" href="/css/responsive.css">

  <style>
    .tx-badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      margin-top: 4px;
    }

    .tx-badge.income {
      color: #065f46;
      background: rgba(16, 185, 129, 0.18);
    }

    .tx-badge.expense {
      color: #991b1b;
      background: rgba(239, 68, 68, 0.17);
    }

    .tx-badge.savings {
      color: #1e40af;
      background: rgba(59, 130, 246, 0.16);
    }

    [data-theme="dark"] .tx-badge.income {
      color: #a7f3d0;
      background: rgba(16, 185, 129, 0.2);
    }

    [data-theme="dark"] .tx-badge.expense {
      color: #fecaca;
      background: rgba(239, 68, 68, 0.22);
    }

    [data-theme="dark"] .tx-badge.savings {
      color: #bfdbfe;
      background: rgba(59, 130, 246, 0.22);
    }

    .tx-list {
      background-color: var(--card-bg);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow-sm);
      overflow: hidden;
      border: 1px solid var(--border-primary);
    }

    .stats-grid .stat-value {
      font-size: var(--font-size-2xl);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar" id="sidebar-container"></aside>

    <main class="main-content">
      <div class="app-header">
        <div class="header-title">
          <h1 data-i18n="transactions.title">Historique des transactions</h1>
          <p data-i18n="transactions.subtitle">Toutes vos entrées et sorties d'argent dans un seul menu</p>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label" data-i18n="transactions.total_in">Total entrées</div>
          <div class="stat-value" id="tx-total-in">0 MGA</div>
        </div>
        <div class="stat-card">
          <div class="stat-label" data-i18n="transactions.total_out">Total sorties</div>
          <div class="stat-value" id="tx-total-out">0 MGA</div>
        </div>
        <div class="stat-card">
          <div class="stat-label" data-i18n="transactions.total_count">Transactions</div>
          <div class="stat-value" id="tx-count">0</div>
        </div>
      </div>

      <div class="filters-card card">
        <div class="filters-row">
          <select id="source-filter" class="form-select">
            <option value="" data-i18n="transactions.filter_all_types">Tous les types</option>
            <option value="income" data-i18n="transactions.filter_income">Revenus</option>
            <option value="expense" data-i18n="transactions.filter_expense">Dépenses</option>
            <option value="savings" data-i18n="transactions.filter_savings">Épargne</option>
          </select>

          <select id="period-filter" class="form-select">
            <option value="month" data-i18n="transactions.period_month">Ce mois</option>
            <option value="week" data-i18n="transactions.period_week">Cette semaine</option>
            <option value="year" data-i18n="transactions.period_year">12 derniers mois</option>
            <option value="all" data-i18n="transactions.period_all">Tout</option>
          </select>

          <input
            type="text"
            id="search-input"
            class="form-input"
            data-i18n-placeholder="transactions.search_placeholder"
            placeholder="Rechercher une transaction..."
          >
        </div>
      </div>

      <div class="tx-list" id="transactions-list"></div>
    </main>

    <nav class="bottom-nav" id="bottom-nav"></nav>
  </div>

  <script type="module" src="/js/mobile-menu.js"></script>
  <script type="module" src="/js/app.js"></script>
  <script type="module" src="/js/transactions.js"></script>
</body>
</html>
